# Short-form compression for the Whole-Model View (aimaturitymodels.com)
#
# One terse, one-sentence string per dimension/level, keyed "D<N>.<Level>".
# Source of truth for this file's content: the reconciled compression at
# briefs/2026-07-23-d1-d3-reconciliation/02-shortform-compression-v4-post-reconciliation.md
# in the OKF TOGAF repo (private governance corpus) -- that document is
# where changes to this content are reasoned about and reviewed; this file
# is the machine-readable rendering the site's build process fetches.
#
# `flag`, where present, names an open review item from this model's own
# "Review flags before lock" list. It is not a maturity judgment -- it
# means the cell's content is accurate as drafted but the underlying
# question is still open. Render it visibly, don't drop it silently.
#
# Full definitions, transitions, and reasoning live in
# ai_native_sdlc_maturity_model.md (D4-D13) and shared_intelligence_layer.md
# (D1-D3, STD-SHARED-INTELLIGENCE v1.0.0) -- this file is a compression of
# those, not a replacement for them.

